<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              geist: ["Geist", "sans-serif"],
            },
            boxShadow: {
              card: "0 1px 3px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.05)",
              "card-hover":
                "0 6px 20px rgba(0,0,0,0.09), 0 0 0 1px rgba(0,0,0,0.05)",
            },
            keyframes: {
              fadeUp: {
                "0%": { opacity: "0", transform: "translateY(8px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
            animation: {
              fadeUp: "fadeUp 0.22s ease forwards",
            },
          },
        },
      };
    </script>
  </head>

  <body class="min-h-screen bg-[#f4f6f8] font-geist">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8 sm:py-10">
      <h1 class="text-2xl font-bold text-[#002C5C] mb-6">
        Job Application Tracker
      </h1>
    </div>
  </body>
</html>
